name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site bundle
        run: |
          rm -rf _site
          mkdir -p _site

          # Copy the main site so its index.html becomes the deployed root
          cp -R www.neilwilsondesign.co.uk/. _site/

          # Copy the other asset folders so existing links can keep working
          cp -R lirp.cdn-website.com _site/lirp.cdn-website.com
          cp -R irp.cdn-website.com _site/irp.cdn-website.com

          # Prevent Jekyll from altering/ignoring files and folders
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
